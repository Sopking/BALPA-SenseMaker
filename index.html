<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SenseMaker Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .frame-wrapper {
      max-width: 100%;
      box-sizing: border-box;
      padding: 16px;
      width: 100%;
    }
    .frame-container {
      margin: 0 auto;
      max-width: 900px;
      background: #020617;
      border-radius: 12px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.6);
      border: 1px solid #1f2937;
      padding: 16px;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 1.1rem;
      font-weight: 500;
      color: #e5e7eb;
    }
    p.subtitle {
      margin: 0 0 16px 0;
      font-size: 0.85rem;
      color: #9ca3af;
    }
    iframe {
      width: 100%;
      height: 500px;
      border: 0;
      border-radius: 8px;
      background: #020617;
    }
    @media (max-width: 900px) {
      .frame-container {
        padding: 12px;
      }
      iframe {
        height: 420px;
      }
    }
  </style>
</head>
<body>
  <div class="frame-wrapper">
    <div class="frame-container">
      <h1>SenseMaker Dashboard</h1>
      <p class="subtitle">Interactive dashboard embedded from platform.sensemaker-suite.com</p>
      <iframe
        width="800"
        height="500"
        type="dashboard_v2_widget"
        src="https://platform.sensemaker-suite.com/r/e/69e3b6b9-82cc-4f9a-a62b-7e5f99923af3"
        title="Embedded Content"
        frameborder="0"
        allow="accelerometer; clipboard-write;"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
